<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Account Action</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  verifyPasswordResetCode,
  confirmPasswordReset,
  applyActionCode
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDstk_UwkFTGQYiehAXjMvnElxclxaII",
  authDomain: "rbxmhub.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// UI
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const pass = document.getElementById("pass");
const pass2 = document.getElementById("pass2");
const status = document.getElementById("status");
const loader = document.getElementById("loader");
const recaptchaBox = document.getElementById("recaptchaBox");

// params
const params = new URLSearchParams(location.search);
const mode = params.get("mode");
const oobCode = params.get("oobCode");

// IP tracking
let userIP = null;

function setStatus(text, ok=false){
  status.innerText = text;
  status.className = ok ? "status ok" : "status";
}

function firebaseError(code){
  switch(code){
    case "auth/expired-action-code": return "Link has expired.";
    case "auth/invalid-action-code": return "Invalid or already used link.";
    case "auth/user-disabled": return "Account is disabled.";
    default: return "Something went wrong. Try again.";
  }
}

// get IP
async function getIP(){
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return "unknown";
  }
}

// attempts per IP
function getAttempts(ip){
  return Number(localStorage.getItem("attempts_" + ip) || 0);
}

function addAttempt(ip){
  const v = getAttempts(ip) + 1;
  localStorage.setItem("attempts_" + ip, v);
  return v;
}

function showScreen(type){
  form.style.display = "none";
  loader.style.display = "none";

  if(type === "expired"){
    title.innerText = "Link expired";
    desc.innerText = "This action link is no longer valid.";
  }

  if(type === "invalid"){
    title.innerText = "Invalid link";
    desc.innerText = "This link is broken or already used.";
  }

  if(type === "success"){
    title.innerText = "Success";
    desc.innerText = "Your account has been updated.";
  }
}

async function init(){
  userIP = await getIP();

  if(!mode || !oobCode){
    showScreen("invalid");
    return;
  }

  // LIMIT PRÓB (per IP)
  const attempts = getAttempts(userIP);
  if(attempts >= 3){
    showScreen("expired");
    setStatus("Too many attempts. Try again later.");
    return;
  }

  if(mode === "resetPassword"){
    title.innerText = "Reset Password";
    desc.innerText = "Create a new secure password";

    try{
      await verifyPasswordResetCode(auth, oobCode);
      loader.style.display = "none";
      form.style.display = "block";

      btn.onclick = async () => {

        const recaptcha = grecaptcha.getResponse();
        if(!recaptcha){
          setStatus("Confirm reCAPTCHA first.");
          return;
        }

        if(pass.value !== pass2.value){
          setStatus("Passwords do not match");
          return;
        }

        addAttempt(userIP);

        btn.disabled = true;
        btn.innerText = "Verifying...";

        try{
          await confirmPasswordReset(auth, oobCode, pass.value);
          showScreen("success");
          setStatus("Password updated successfully", true);
          grecaptcha.reset();
        }catch(e){
          setStatus(firebaseError(e.code));
        }

        btn.disabled = false;
        btn.innerText = "Update Password";
      };

    }catch(e){
      showScreen("invalid");
      setStatus(firebaseError(e.code));
    }
  }

  if(mode === "verifyEmail"){
    title.innerText = "Verifying email";
    desc.innerText = "Please wait...";

    try{
      await applyActionCode(auth, oobCode);
      showScreen("success");
    }catch(e){
      showScreen("invalid");
      setStatus(firebaseError(e.code));
    }
  }
}

window.onload = init;
</script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b1220;
  color:white;
}

.card{
  width:380px;
  padding:30px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
}

h1{margin:0;font-size:24px}
p{opacity:.6}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* GOOGLE STYLE LOADER */
.loader{
  width:48px;
  height:48px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.status{
  margin-top:12px;
  font-size:13px;
}

.status.ok{color:#22c55e}

/* reCAPTCHA */
#recaptchaBox{
  margin-top:12px;
}

/* trust footer */
.footer{
  margin-top:15px;
  font-size:11px;
  opacity:.5;
  text-align:center;
}

/* MOBILE */
@media(max-width:420px){
  .card{width:92%}
}
</style>
</head>

<body>

<div class="card">
  <h1 id="title">Loading</h1>
  <p id="desc">Please wait...</p>

  <div id="loader" class="loader"></div>

  <div id="form" style="display:none;">
    <input type="password" id="pass" placeholder="New password">
    <input type="password" id="pass2" placeholder="Confirm password">

    <div id="recaptchaBox" class="g-recaptcha"
      data-sitekey="6LezbJksAAAAABiiwZm1shS508Qs30lQ6QeE7VFg"></div>

    <button id="btn">Update Password</button>
    <div id="status" class="status"></div>
  </div>

  <div class="footer">
    Secure Firebase Authentication • Anti-bot protection enabled
  </div>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</body>
</html>
