<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Action</title>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  verifyPasswordResetCode,
  confirmPasswordReset,
  applyActionCode
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyBDstk_UwkFTGqQyiehAXjMvnElxclxaII",
  authDomain: "rbxmhub.firebaseapp.com"
});

const auth = getAuth(app);

let pass, pass2, status, confirmBtn;

function setStatus(text, ok=false){
  status.innerText = text;
  status.className = ok ? "status ok" : "status error";
}

function shake(el){
  el.classList.add("shake");
  setTimeout(()=>el.classList.remove("shake"),400);
}

function cooldown(btn){
  btn.disabled = true;
  setTimeout(()=>btn.disabled=false,2000);
}

function detectCaps(e){
  if(e.getModifierState("CapsLock")){
    setStatus("Caps Lock is ON");
  }
}

function redirect(){
  document.body.classList.add("fade-out");
  setTimeout(()=>{
    window.location.href = "https://rbxmhub.vercel.app";
  },1200);
}

async function init(){

  pass = document.getElementById("pass");
  pass2 = document.getElementById("pass2");
  status = document.getElementById("status");
  confirmBtn = document.getElementById("confirmBtn");

  const params = new URLSearchParams(location.search);
  const mode = params.get("mode");
  const oobCode = params.get("oobCode");

  document.getElementById("loader").style.display="none";
  document.getElementById("form").style.display="block";

  confirmBtn.onclick = async () => {

    const captcha = grecaptcha.getResponse();
    if(!captcha){
      setStatus("Confirm reCAPTCHA");
      shake(confirmBtn);
      return;
    }

    if(pass.value !== pass2.value){
      setStatus("Passwords do not match");
      shake(pass2);
      grecaptcha.reset();
      return;
    }

    if(pass.value.toLowerCase().includes("rbxm")){
      setStatus("Password too weak");
      shake(pass);
      return;
    }

    confirmBtn.innerText="Verifying...";
    confirmBtn.disabled=true;

    try{

      if(mode==="resetPassword"){
        await verifyPasswordResetCode(auth, oobCode);
        await confirmPasswordReset(auth, oobCode, pass.value);
      }

      if(mode==="verifyEmail"){
        await applyActionCode(auth, oobCode);
      }

      setStatus("Success!",true);
      redirect();

    }catch(e){
      setStatus("Invalid or expired link");
      grecaptcha.reset();
      cooldown(confirmBtn);
    }

    confirmBtn.innerText="Confirm";
  };

  pass.addEventListener("keyup", detectCaps);
}

window.onload = init;
</script>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b1220;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

.card{
  width:380px;
  padding:25px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  animation:fadeIn .6s;
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
  font-size:16px;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:16px;
}

/* STICKY MOBILE */
@media(max-width:500px){
  button{
    position:sticky;
    bottom:10px;
  }
}

/* LOADER BAR */
.progress{
  height:3px;
  background:#3b82f6;
  animation:progress 2s infinite;
}

@keyframes progress{
  0%{width:0}
  100%{width:100%}
}

/* FADE */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
}

.fade-out{
  opacity:0;
  transition:1s;
}

/* SHAKE */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

.shake{
  animation:shake .3s;
}

.status{
  margin-top:10px;
  font-size:13px;
}

.status.ok{color:#22c55e}
.status.error{color:#ef4444}

/* MOBILE INPUTS */
@media(max-width:420px){
  .card{width:95%}
  input{font-size:18px}
}

/* FOOTER */
.footer{
  margin-top:15px;
  font-size:11px;
  opacity:.5;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">
  <div class="progress"></div>

  <h2>Secure Action</h2>

  <div id="loader">Loading...</div>

  <div id="form" style="display:none;">
    <input id="pass" type="password" placeholder="New password">
    <input id="pass2" type="password" placeholder="Confirm password">

    <div class="g-recaptcha"
      data-sitekey="6LezbJksAAAAABiiwZm1shS508Qs30lQ6QeE7VFg"></div>

    <button id="confirmBtn">Confirm</button>
    <div id="status" class="status"></div>
  </div>

  <div class="footer">
    🔒 Powered by Firebase Authentication
  </div>
</div>

</body>
</html>
