<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Action</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  verifyPasswordResetCode,
  confirmPasswordReset,
  applyActionCode,
  checkActionCode
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔴 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBDstk_UwkFTGqQyiehAXjMvnElxclxaII",
  authDomain: "rbxmhub.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// URL params
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");
const oobCode = params.get("oobCode");

// UI
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const form = document.getElementById("form");
const password = document.getElementById("password");
const password2 = document.getElementById("password2");
const btn = document.getElementById("btn");
const strength = document.getElementById("strength");
const toggle = document.getElementById("toggle");
const statusBox = document.getElementById("status");

// utils
function setStatus(type, msg) {
  statusBox.className = "status " + type;
  statusBox.innerText = msg;
}

function validatePassword(pw) {
  return /^(?=.*[A-Z])(?=.*\d).{6,}$/.test(pw);
}

function passwordStrength(pw) {
  let score = 0;
  if (pw.length > 5) score++;
  if (pw.match(/[A-Z]/)) score++;
  if (pw.match(/\d/)) score++;
  if (pw.length > 10) score++;
  return score;
}

password?.addEventListener("input", () => {
  const s = passwordStrength(password.value);
  strength.value = s;
});

// toggle password
toggle?.addEventListener("click", () => {
  password.type = password.type === "password" ? "text" : "password";
});

// MAIN
async function init() {
  if (!mode || !oobCode) {
    title.innerText = "Invalid link";
    setStatus("error", "Missing parameters.");
    return;
  }

  // RESET PASSWORD
  if (mode === "resetPassword") {
    title.innerText = "Reset Password";
    desc.innerText = "Enter a new password below.";

    try {
      await verifyPasswordResetCode(auth, oobCode);
      form.style.display = "block";

      btn.onclick = async () => {
        const pw = password.value;
        const pw2 = password2.value;

        if (!validatePassword(pw)) {
          setStatus("error", "Weak password (min 6 chars, 1 uppercase, 1 number)");
          return;
        }

        if (pw !== pw2) {
          setStatus("error", "Passwords do not match");
          return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
          await confirmPasswordReset(auth, oobCode, pw);
          setStatus("success", "Password reset successful!");
          form.style.display = "none";

          setTimeout(() => {
            window.location.href = "/";
          }, 2000);

        } catch (e) {
          setStatus("error", e.message);
        }

        btn.disabled = false;
        btn.innerText = "Reset Password";
      };

    } catch (e) {
      setStatus("error", "Invalid or expired link.");
    }
  }

  // VERIFY EMAIL
  if (mode === "verifyEmail") {
    title.innerText = "Verifying email...";

    try {
      await applyActionCode(auth, oobCode);
      setStatus("success", "Email verified successfully!");

      setTimeout(() => {
        window.location.href = "/";
      }, 2000);

    } catch (e) {
      setStatus("error", e.message);
    }
  }

  // RECOVER EMAIL
  if (mode === "recoverEmail") {
    title.innerText = "Recover Email";

    try {
      const info = await checkActionCode(auth, oobCode);
      await applyActionCode(auth, oobCode);

      setStatus("success", "Email restored: " + info.data.email);

    } catch (e) {
      setStatus("error", e.message);
    }
  }
}

window.onload = init;
</script>

<style>
body {
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card {
  width:400px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  box-shadow:0 0 50px rgba(0,0,0,0.6);
}

h1 {margin:0 0 10px;}
p {opacity:0.7;}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

.status {
  margin-top:15px;
  padding:10px;
  border-radius:10px;
}

.status.success {background:#065f46;}
.status.error {background:#7f1d1d;}

meter {
  width:100%;
  margin-top:10px;
}

#form {display:none;}
</style>
</head>

<body>
<div class="card">
  <h1 id="title">Loading...</h1>
  <p id="desc">Please wait...</p>

  <div id="form">
    <input type="password" id="password" placeholder="New password">
    <input type="password" id="password2" placeholder="Confirm password">
    <button id="toggle">Show / Hide</button>
    <meter id="strength" min="0" max="4"></meter>
    <button id="btn">Reset Password</button>
  </div>

  <div id="status" class="status"></div>
</div>
</body>
</html>
