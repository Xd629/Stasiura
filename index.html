<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Account Action</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  verifyPasswordResetCode,
  confirmPasswordReset,
  applyActionCode
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDstk_UwkFTGqQyiehAXjMvnElxclxaII",
  authDomain: "rbxmhub.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const mode = params.get("mode");
const oobCode = params.get("oobCode");

const title = document.getElementById("title");
const desc = document.getElementById("desc");
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const pass = document.getElementById("pass");
const pass2 = document.getElementById("pass2");
const status = document.getElementById("status");
const loading = document.getElementById("loading");

function setStatus(text, ok=false) {
  status.innerText = text;
  status.className = ok ? "status ok" : "status";
}

async function init() {
  if (!mode || !oobCode) {
    title.innerText = "Invalid link";
    setStatus("Missing or broken link.");
    loading.style.display = "none";
    return;
  }

  if (mode === "resetPassword") {
    title.innerText = "Reset Password";
    desc.innerText = "Create a new secure password";

    try {
      await verifyPasswordResetCode(auth, oobCode);
      loading.style.display = "none";
      form.style.display = "block";

      btn.onclick = async () => {
        if (pass.value !== pass2.value) {
          setStatus("Passwords do not match");
          return;
        }

        btn.classList.add("loading");

        try {
          await confirmPasswordReset(auth, oobCode, pass.value);
          setStatus("Password updated successfully!", true);
          form.style.display = "none";
        } catch(e) {
          setStatus(e.message);
        }

        btn.classList.remove("loading");
      };

    } catch(e) {
      loading.style.display = "none";
      setStatus("This link has expired or is invalid.");
    }
  }

  if (mode === "verifyEmail") {
    title.innerText = "Verifying your email";
    desc.innerText = "Almost done";

    try {
      await applyActionCode(auth, oobCode);
      loading.style.display = "none";
      setStatus("Email successfully verified!", true);
    } catch(e) {
      loading.style.display = "none";
      setStatus(e.message);
    }
  }
}

window.onload = init;
</script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

/* glow */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:#3b82f6;
  filter:blur(180px);
  opacity:0.3;
  top:-200px;
}

.card{
  width:380px;
  padding:35px;
  border-radius:24px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  box-shadow:0 0 60px rgba(0,0,0,0.6);
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1}
}

h1{
  margin:0;
  font-size:26px;
}

p{
  margin-top:8px;
  opacity:0.6;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button.loading{
  opacity:0.6;
  pointer-events:none;
}

/* 🔥 DISCORD-STYLE DOTS */
.dots{
  display:inline-flex;
  gap:5px;
  margin-left:6px;
}

.dots span{
  width:6px;
  height:6px;
  background:#60a5fa;
  border-radius:50%;
  animation:bounce 1.2s infinite ease-in-out;
}

.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}

@keyframes bounce{
  0%,80%,100%{transform:scale(0.6); opacity:0.5;}
  40%{transform:scale(1); opacity:1;}
}

.status{
  margin-top:15px;
  font-size:13px;
}

.status.ok{
  color:#22c55e;
}

#form{display:none;}

.loader{
  margin-top:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="title">Processing</h1>
  <p id="desc">
    Please wait
    <span class="dots">
      <span></span>
      <span></span>
      <span></span>
    </span>
  </p>

  <div id="loading" class="loader"></div>

  <div id="form">
    <input type="password" id="pass" placeholder="New password">
    <input type="password" id="pass2" placeholder="Confirm password">
    <button id="btn">Update Password</button>
  </div>

  <div id="status" class="status"></div>
</div>

</body>
</html>
