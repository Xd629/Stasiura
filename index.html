<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  verifyPasswordResetCode,
  confirmPasswordReset,
  applyActionCode
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDstk_UwkFTGqQyiehAXjMvnElxclxaII",
  authDomain: "rbxmhub.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// params
const params = new URLSearchParams(location.search);
const mode = params.get("mode");
const oobCode = params.get("oobCode");

// UI (dopiero po DOM load!)
let title, desc, form, btn, pass, pass2, status, loader, confirmBtn;

function setStatus(text, ok=false){
  status.innerText = text;
  status.className = ok ? "status ok" : "status";
}

function firebaseError(code){
  switch(code){
    case "auth/expired-action-code": return "Link expired.";
    case "auth/invalid-action-code": return "Invalid or already used link.";
    default: return "Something went wrong.";
  }
}

function redirect(){
  setTimeout(()=>{
    window.location.href = "https://rbxmhub.vercel.app";
  },1500);
}

async function init(){

  // przypisanie elementów (FIX!)
  title = document.getElementById("title");
  desc = document.getElementById("desc");
  form = document.getElementById("form");
  btn = document.getElementById("btn");
  pass = document.getElementById("pass");
  pass2 = document.getElementById("pass2");
  status = document.getElementById("status");
  loader = document.getElementById("loader");
  confirmBtn = document.getElementById("confirmBtn");

  if(!mode || !oobCode){
    title.innerText = "Invalid link";
    desc.innerText = "Missing parameters.";
    loader.style.display = "none";
    return;
  }

  loader.style.display = "none";
  form.style.display = "block";

  // RESET PASSWORD
  if(mode === "resetPassword"){
    title.innerText = "Reset Password";
    desc.innerText = "Create a new password";

    confirmBtn.onclick = async () => {

      const captcha = grecaptcha.getResponse();
      if(!captcha){
        setStatus("Confirm reCAPTCHA first.");
        return;
      }

      if(pass.value !== pass2.value){
        setStatus("Passwords do not match.");
        return;
      }

      confirmBtn.disabled = true;
      confirmBtn.innerText = "Verifying...";

      try{
        await verifyPasswordResetCode(auth, oobCode);
        await confirmPasswordReset(auth, oobCode, pass.value);

        setStatus("Password updated!", true);
        redirect();

      }catch(e){
        setStatus(firebaseError(e.code));
      }

      confirmBtn.disabled = false;
      confirmBtn.innerText = "Confirm";
    };
  }

  // VERIFY EMAIL
  if(mode === "verifyEmail"){
    title.innerText = "Verify Email";
    desc.innerText = "Click confirm to verify";

    // ukryj pola hasła
    pass.style.display = "none";
    pass2.style.display = "none";

    confirmBtn.onclick = async () => {

      const captcha = grecaptcha.getResponse();
      if(!captcha){
        setStatus("Confirm reCAPTCHA first.");
        return;
      }

      confirmBtn.disabled = true;
      confirmBtn.innerText = "Verifying...";

      try{
        await applyActionCode(auth, oobCode);

        setStatus("Email verified!", true);
        redirect();

      }catch(e){
        setStatus(firebaseError(e.code));
      }

      confirmBtn.disabled = false;
      confirmBtn.innerText = "Confirm";
    };
  }
}

window.onload = init;
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:360px;
  padding:25px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:disabled{
  opacity:.5;
}

.loader{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.status{
  margin-top:10px;
  font-size:13px;
}

.status.ok{
  color:#22c55e;
}

.g-recaptcha{
  margin-top:12px;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title">Loading</h2>
  <p id="desc">Please wait...</p>

  <div id="loader" class="loader"></div>

  <div id="form" style="display:none;">
    <input type="password" id="pass" placeholder="New password">
    <input type="password" id="pass2" placeholder="Confirm password">

    <div class="g-recaptcha"
      data-sitekey="6LezbJksAAAAABiiwZm1shS508Qs30lQ6QeE7VFg"></div>

    <button id="confirmBtn">Confirm</button>

    <div id="status" class="status"></div>
  </div>
</div>

</body>
</html>
